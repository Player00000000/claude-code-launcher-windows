<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CLAUDE CODE LAUNCHER</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323:wght@400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="static/style.css">
</head>
<body>
  <div class="scanlines"></div>
  <div class="crt-overlay"></div>

  <header>
    <div class="header-inner">
      <div class="logo">
        <span class="logo-icon">▶</span>
        <span class="logo-text">CLAUDE CODE</span>
        <span class="cursor blink">█</span>
      </div>
      <input class="search-bar" id="search-bar" type="text"
             placeholder="/ SEARCH..." oninput="filterProjects(this.value)"
             autocomplete="off" spellcheck="false">
      <div class="header-meta">
        <div id="credit-widget" class="credit-widget"></div>
        <span class="project-count" id="project-count">— PROJECTS</span>
        <button class="btn-pixel btn-archive-toggle" id="archive-toggle"
                onclick="toggleArchivedView()" title="Show archived projects">⊘</button>
        <button class="btn-pixel btn-add" onclick="openAddModal()">+ NEW</button>
      </div>
    </div>
  </header>

  <main>
    <div class="grid" id="project-grid">
      <div class="loading-msg">LOADING PROJECTS<span class="blink">█</span></div>
    </div>
  </main>

  <div id="toast" class="toast hidden"></div>

  <!-- ADD MODAL -->
  <div id="add-modal" class="modal hidden" onclick="closeOnBackdrop(event,'add-modal')">
    <div class="modal-box">
      <div class="modal-title">+ NEW PROJECT</div>
      <div class="field-group">
        <label>PROJECT NAME</label>
        <input type="text" id="add-name" placeholder="My New Project" maxlength="50">
      </div>
      <div class="field-group">
        <label>DESCRIPTION</label>
        <textarea id="add-desc" placeholder="What does it do?" rows="3" maxlength="200"></textarea>
      </div>
      <div class="field-group">
        <label>TECH TAGS (comma-separated)</label>
        <input type="text" id="add-tech" placeholder="Python, Flask, React">
      </div>
      <div class="field-group">
        <label>STATUS</label>
        <select id="add-status" class="status-select">
          <option value="ACTIVE">ACTIVE</option>
          <option value="WIP">WIP</option>
          <option value="PAUSED">PAUSED</option>
          <option value="DONE">DONE</option>
        </select>
      </div>
      <div class="field-group">
        <label>COLOR</label>
        <div class="color-row">
          <input type="color" id="add-color" value="#888899">
          <div class="color-swatches">
            <span class="swatch" style="background:#ff6b6b" onclick="setSwatch('#ff6b6b','add-color')"></span>
            <span class="swatch" style="background:#4ecdc4" onclick="setSwatch('#4ecdc4','add-color')"></span>
            <span class="swatch" style="background:#ffe66d" onclick="setSwatch('#ffe66d','add-color')"></span>
            <span class="swatch" style="background:#a8e063" onclick="setSwatch('#a8e063','add-color')"></span>
            <span class="swatch" style="background:#c77dff" onclick="setSwatch('#c77dff','add-color')"></span>
            <span class="swatch" style="background:#ff9f43" onclick="setSwatch('#ff9f43','add-color')"></span>
            <span class="swatch" style="background:#48dbfb" onclick="setSwatch('#48dbfb','add-color')"></span>
            <span class="swatch" style="background:#ff6b9d" onclick="setSwatch('#ff6b9d','add-color')"></span>
          </div>
        </div>
      </div>
      <div class="modal-actions">
        <button class="btn-pixel btn-cancel" onclick="closeModal('add-modal')">CANCEL</button>
        <button class="btn-pixel btn-confirm" onclick="addProject()">CREATE</button>
      </div>
    </div>
  </div>

  <!-- EDIT MODAL -->
  <div id="edit-modal" class="modal hidden" onclick="closeOnBackdrop(event,'edit-modal')">
    <div class="modal-box modal-box-wide">
      <div class="modal-title">✎ EDIT PROJECT</div>
      <input type="hidden" id="edit-name">
      <div class="field-group">
        <label>DESCRIPTION</label>
        <textarea id="edit-desc" rows="2" maxlength="200"></textarea>
      </div>
      <div class="field-group">
        <label>NOTES (private, expandable on card)</label>
        <textarea id="edit-notes" rows="2" maxlength="500" placeholder="Private notes..."></textarea>
      </div>
      <div class="field-group">
        <label>TECH TAGS (comma-separated)</label>
        <input type="text" id="edit-tech" placeholder="Python, Flask, React">
      </div>
      <div class="field-group">
        <label>CUSTOM LAUNCH CMD (blank = cd &amp;&amp; claude)</label>
        <input type="text" id="edit-launch-cmd" placeholder="npm run dev &amp;&amp; claude">
      </div>
      <div class="field-row">
        <div class="field-group" style="flex:1">
          <label>STATUS</label>
          <select id="edit-status" class="status-select">
            <option value="ACTIVE">ACTIVE</option>
            <option value="WIP">WIP</option>
            <option value="PAUSED">PAUSED</option>
            <option value="DONE">DONE</option>
          </select>
        </div>
        <div class="field-group" style="width:110px">
          <label>DEV PORT</label>
          <input type="text" id="edit-port" placeholder="3000" maxlength="5">
        </div>
      </div>
      <div class="field-group">
        <label>COLOR</label>
        <div class="color-row">
          <input type="color" id="edit-color">
          <div class="color-swatches">
            <span class="swatch" style="background:#ff6b6b" onclick="setSwatch('#ff6b6b','edit-color')"></span>
            <span class="swatch" style="background:#4ecdc4" onclick="setSwatch('#4ecdc4','edit-color')"></span>
            <span class="swatch" style="background:#ffe66d" onclick="setSwatch('#ffe66d','edit-color')"></span>
            <span class="swatch" style="background:#a8e063" onclick="setSwatch('#a8e063','edit-color')"></span>
            <span class="swatch" style="background:#c77dff" onclick="setSwatch('#c77dff','edit-color')"></span>
            <span class="swatch" style="background:#ff9f43" onclick="setSwatch('#ff9f43','edit-color')"></span>
            <span class="swatch" style="background:#48dbfb" onclick="setSwatch('#48dbfb','edit-color')"></span>
            <span class="swatch" style="background:#ff6b9d" onclick="setSwatch('#ff6b9d','edit-color')"></span>
          </div>
        </div>
      </div>
      <div class="modal-actions">
        <button class="btn-pixel btn-archive" id="edit-archive-btn" onclick="archiveFromEdit()">⊘ ARCHIVE</button>
        <button class="btn-pixel btn-cancel" onclick="closeModal('edit-modal')">CANCEL</button>
        <button class="btn-pixel btn-confirm" onclick="saveEdit()">SAVE</button>
      </div>
    </div>
  </div>

  <!-- BILLING DAY MODAL -->
  <div id="billing-modal" class="modal hidden" onclick="closeOnBackdrop(event,'billing-modal')">
    <div class="modal-box" style="max-width:340px">
      <div class="modal-title">⚡ BILLING RESET DATE</div>
      <div class="field-group">
        <label>DAY OF MONTH (1–28)</label>
        <input type="number" id="billing-day-input" min="1" max="28" placeholder="1">
      </div>
      <p class="modal-hint">Day when Anthropic billing resets. Used to calculate countdown timer.</p>
      <div class="modal-actions">
        <button class="btn-pixel btn-cancel" onclick="closeModal('billing-modal')">CANCEL</button>
        <button class="btn-pixel btn-confirm" onclick="saveBillingDay()">SAVE</button>
      </div>
    </div>
  </div>

  <script src="static/app.js"></script>
</body>
</html>
